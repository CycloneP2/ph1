name: Build EDGY Hacks Tweak

on:
  workflow_dispatch:
    inputs:
      build_for:
        description: 'Target build (jailbreak/sideload)'
        required: true
        default: 'both'
        type: choice
        options:
          - jailbreak
          - sideload
          - both

jobs:
  build-tweak:
    name: Build Tweak for iOS
    runs-on: macos-14
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install ldid

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -L https://github.com/theos/sdks/archive/master.zip -o sdks.zip
          unzip -q sdks.zip
          mkdir -p $THEOS/sdks
          mv -f sdks-master/* $THEOS/sdks/ || true
          rm -rf sdks-master sdks.zip
          ls -R $THEOS/makefiles/common.mk
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Set environment
        run: |
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV
          echo "THEOS_DEVICE_IP=localhost" >> $GITHUB_ENV

      - name: Build for Jailbreak
        if: ${{ github.event.inputs.build_for == 'jailbreak' || github.event.inputs.build_for == 'both' }}
        run: |
          cd tweak
          make package FINALPACKAGE=1 THEOS=$THEOS
        continue-on-error: false

      - name: Build for Sideload (Titanox)
        if: ${{ github.event.inputs.build_for == 'sideload' || github.event.inputs.build_for == 'both' }}
        run: |
          cd tweak
          export ADDITIONAL_CFLAGS="-DNON_JAILBREAK=1"
          make package FINALPACKAGE=1 THEOS=$THEOS
        continue-on-error: false

      - name: Upload .deb (Jailbreak)
        if: ${{ github.event.inputs.build_for == 'jailbreak' || github.event.inputs.build_for == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: edgy-hacks-jailbreak
          path: tweak/packages/*.deb

      - name: Upload .dylib (Sideload)
        if: ${{ github.event.inputs.build_for == 'sideload' || github.event.inputs.build_for == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: edgy-hacks-sideload
          path: tweak/.theos/obj/debug/*.dylib
